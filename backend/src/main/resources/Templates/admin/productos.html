<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Administración de productos - StockSync.">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <title>Admin Productos - StockSync</title>
</head>
<body class="admin-body">

    <aside th:replace="~{fragments/admin-sidebar :: sidebar(seccionActiva='productos')}"></aside>

    <main class="admin-main">
        <header th:replace="~{fragments/admin-sidebar :: topbar(titulo='Productos', subtitulo='Gestión de productos del inventario')}"></header>

        <div class="admin-content">
            <!-- Flash Messages -->
            <div th:if="${successMsg}" class="admin-alert admin-alert--success">
                <span>✅</span> <span th:text="${successMsg}">Éxito</span>
            </div>
            <div th:if="${errorMsg}" class="admin-alert admin-alert--error">
                <span>❌</span> <span th:text="${errorMsg}">Error</span>
            </div>

            <!-- Product Management Panel -->
            <div class="admin-panel">
                <div class="admin-panel__header">
                    <h2 class="admin-panel__title">Listado de Productos</h2>
                    <a th:href="@{/admin/productos/nuevo}" class="admin-btn admin-btn--primary">
                        + Nuevo Producto
                    </a>
                </div>
                <div class="admin-panel__body">
                    <div class="admin-table__wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Código</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Precio</th>
                                    <th>Fecha Creación</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${productos.isEmpty()}">
                                    <td colspan="7" class="admin-table__empty">No hay productos registrados.</td>
                                </tr>
                                <tr th:each="p : ${productos}">
                                    <td th:text="${p.idProducto}">1</td>
                                    <td><span class="admin-badge" th:text="${p.codigo}">PROD-001</span></td>
                                    <td class="admin-table__name" th:text="${p.nombre}">Producto</td>
                                    <td class="admin-table__desc" th:text="${p.descripcion}">Descripción</td>
                                    <td class="admin-table__price" th:text="'$' + ${p.precio}">$0</td>
                                    <td th:text="${p.fechaCreacion}">2026-01-01</td>
                                    <td class="admin-table__actions">
                                        <a th:href="@{/admin/productos/editar/{id}(id=${p.idProducto})}"
                                           class="admin-btn admin-btn--edit" title="Editar">✏️ Editar</a>
                                        <a th:href="@{/admin/productos/eliminar/{id}(id=${p.idProducto})}"
                                           class="admin-btn admin-btn--delete" title="Eliminar"
                                           onclick="return confirm('¿Estás seguro de eliminar este producto?')">🗑️</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('adminSidebar').classList.toggle('admin-sidebar--open');
        }
    </script>

</body>
</html>
