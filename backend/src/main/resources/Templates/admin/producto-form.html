<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de producto - StockSync.">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <title th:text="${producto.idProducto != null} ? 'Editar Producto' : 'Nuevo Producto'">Producto - StockSync</title>
</head>
<body class="admin-body">

    <aside th:replace="~{fragments/admin-sidebar :: sidebar(seccionActiva='productos')}"></aside>

    <main class="admin-main">
        <header th:replace="~{fragments/admin-sidebar :: topbar(titulo='Formulario de Producto', subtitulo='Crear o editar un producto')}"></header>

        <div class="admin-content">
            <div class="admin-panel">
                <div class="admin-panel__header">
                    <h2 class="admin-panel__title"
                        th:text="${producto.idProducto != null} ? 'Editar Producto' : 'Nuevo Producto'">
                        Formulario
                    </h2>
                </div>
                <div class="admin-panel__body">
                    <form th:action="@{/admin/productos/guardar}" method="post" class="admin-form">
                        <input type="hidden" name="idProducto" th:value="${producto.idProducto}">

                        <div class="admin-form__row">
                            <div class="admin-form__group">
                                <label class="admin-form__label" for="codigo">Código</label>
                                <input class="admin-form__input" type="text" id="codigo" name="codigo"
                                       th:value="${producto.codigo}" placeholder="Ej: PROD-001" required>
                            </div>
                            <div class="admin-form__group">
                                <label class="admin-form__label" for="nombre">Nombre</label>
                                <input class="admin-form__input" type="text" id="nombre" name="nombre"
                                       th:value="${producto.nombre}" placeholder="Nombre del producto" required>
                            </div>
                        </div>

                        <div class="admin-form__group">
                            <label class="admin-form__label" for="descripcion">Descripción</label>
                            <textarea class="admin-form__textarea" id="descripcion" name="descripcion"
                                      rows="3" placeholder="Descripción del producto"
                                      th:text="${producto.descripcion}"></textarea>
                        </div>

                        <div class="admin-form__row">
                            <div class="admin-form__group">
                                <label class="admin-form__label" for="precio">Precio (CLP)</label>
                                <input class="admin-form__input" type="number" id="precio" name="precio"
                                       th:value="${producto.precio}" placeholder="0" step="0.01" min="0" required>
                            </div>
                        </div>

                        <div class="admin-form__actions">
                            <button type="submit" class="admin-btn admin-btn--primary">
                                💾 Guardar Producto
                            </button>
                            <a th:href="@{/admin/productos}" class="admin-btn admin-btn--secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('adminSidebar').classList.toggle('admin-sidebar--open');
        }
    </script>

</body>
</html>
